{{ define "main" }}
  <div class="container py-5">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <h2 class="page-title">{{ .Title }}</h2>
        {{ if eq .Section "blog" }}<p>{{ .Date.Format "January 2, 2006" }}</p>{{ end }}
        <div>{{ .Content }}</div>
      </div>
    </div>
  </div>
{{ end }}
