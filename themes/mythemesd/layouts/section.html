{{ define "main" }}
  <h2 class="page-title">{{ .Title }}</h2>
  {{ .Content }}
  {{ range .Pages }}
    <section>
      <h2><a class="blog-title" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      <p>{{ .Date.Format "January 2, 2006" }}</p>
      {{ .Summary }}
    </section>
  {{ end }}
{{ end }}
